spring.application.name=fx-app-spring

# fxdb — designed & seeded by you on W1D3 (ops/fxdb-seed.sql).
# The app does NOT connect at startup: the connection pool is lazy, so this skeleton
# boots happily even with MySQL stopped. It only reaches out when a query runs —
# which is why a container that is "up" is not the same as a container that works.
spring.datasource.url=jdbc:mysql://localhost:3306/fxdb
spring.datasource.username=appuser
spring.datasource.password=apppass
